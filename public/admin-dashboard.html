<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }
    .container {
      width: 80%;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    button {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: white;
      background: #4CAF50;
      padding: 8px 15px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Admin Dashboard - All Bookings</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Vehicle Number</th>
        <th>Service Type</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>

  <a href="index.html">Back to Home</a>
</div>

<script>
function loadBookings() {
  fetch("/api/bookings")
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("bookingTable");
      table.innerHTML = "";

      data.forEach(b => {
        let row = table.insertRow();
        row.insertCell(0).innerText = b.id;
        row.insertCell(1).innerText = b.vehicleNumber;
        row.insertCell(2).innerText = b.serviceType;
        row.insertCell(3).innerText = b.date;
        row.insertCell(4).innerText = b.time || "";
        row.insertCell(5).innerText = b.status;

        let actionCell = row.insertCell(6);
        let btn = document.createElement("button");
        btn.innerText = "Mark Completed";
        btn.onclick = () => updateStatus(b.vehicleNumber);
        actionCell.appendChild(btn);
      });
    });
}

function updateStatus(vehicleNumber) {
  fetch(`/api/bookings/${vehicleNumber}/status`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: "Booking Completed" })
  })
  .then(res => res.json())
  .then(() => loadBookings())
  .catch(err => alert("Error updating status"));
}

// Load bookings on page load
loadBookings();
</script>

</body>
</html>
