<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    .container {
      width: 80%;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #4CAF50;
      color: white;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .completeBtn {
      background-color: #4CAF50;
    }

    .rejectBtn {
      background-color: red;
      margin-left: 10px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: white;
      background: #4CAF50;
      padding: 8px 15px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Admin Dashboard - All Bookings</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Vehicle Number</th>
        <th>Service Type</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>

  <a href="index.html">Back to Home</a>
</div>

<script>

let oldCount = 0;

function loadBookings() {
  fetch("/api/bookings")
    .then(res => res.json())
    .then(data => {

      console.log("DATA:", data); // debug

      if(data.length > oldCount){
        alert("🔥 New Booking Received");
        oldCount = data.length;
      }

      const table = document.getElementById("bookingTable");
      table.innerHTML = "";

      data.forEach(b => {

        let row = table.insertRow();

        row.insertCell(0).innerText = b.id;
        row.insertCell(1).innerText = b.vehicleNumber;
        row.insertCell(2).innerText = b.serviceType;
        row.insertCell(3).innerText = b.date;
        row.insertCell(4).innerText = b.time || "";

        let statusCell = row.insertCell(5);
        statusCell.innerText = b.status || "Pending";

        let actionCell = row.insertCell(6);

        // ✅ Completed button
        let completeBtn = document.createElement("button");
        completeBtn.innerText = "Completed";
        completeBtn.className = "completeBtn";
        completeBtn.onclick = () => {
          statusCell.innerText = "Booking Completed";
          updateStatus(b.vehicleNumber, "Booking Completed");
        };

        actionCell.appendChild(completeBtn);

        // ✅ Reject button
        let rejectBtn = document.createElement("button");
        rejectBtn.innerText = "Reject";
        rejectBtn.className = "rejectBtn";
        rejectBtn.onclick = () => {
          statusCell.innerText = "Booking Rejected";
          updateStatus(b.vehicleNumber, "Booking Rejected");
        };

        actionCell.appendChild(rejectBtn);
      });

    })
    .catch(err => {
      console.log(err);
      alert("❌ Failed to load bookings");
    });
}


// ✅ API call
function updateStatus(vehicleNumber, status) {
  fetch(`/api/bookings/${vehicleNumber}/status`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ status: status })
  })
  .then(res => res.json())
  .then(() => console.log("Updated"))
  .catch(err => alert("❌ Error updating status"));
}


// auto refresh
setInterval(loadBookings, 3000);

// first load
loadBookings();

</script>

</body>
</html>
