<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }
    .container {
      width: 80%;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    button {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      margin: 2px;
    }
    .accept-btn { background-color: #4CAF50; }
    .accept-btn:hover { background-color: #45a049; }
    .reject-btn { background-color: red; }
    .reject-btn:hover { background-color: darkred; }
    .complete-btn { background-color: blue; }
    .complete-btn:hover { background-color: darkblue; }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: white;
      background: #4CAF50;
      padding: 8px 15px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Admin Dashboard - All Bookings</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Vehicle Number</th>
        <th>Service Type</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="bookingTable"></tbody>
  </table>

  <a href="index.html">Back to Home</a>
</div>

<script>
// Load all bookings from localStorage
function loadBookings() {
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
  const table = document.getElementById("bookingTable");
  table.innerHTML = "";

  bookings.forEach((b, index) => {
    let row = table.insertRow();
    row.insertCell(0).innerText = b.id || index + 1;
    row.insertCell(1).innerText = b.vehicleNumber;
    row.insertCell(2).innerText = b.serviceType;
    row.insertCell(3).innerText = b.date;
    row.insertCell(4).innerText = b.time || "";
    row.insertCell(5).innerText = b.status || "Pending";

    let actionCell = row.insertCell(6);

    // Accept button
    let acceptBtn = document.createElement("button");
    acceptBtn.innerText = "Accept";
    acceptBtn.className = "accept-btn";
    acceptBtn.onclick = () => updateStatus(b.id, "Accepted");

    // Reject button
    let rejectBtn = document.createElement("button");
    rejectBtn.innerText = "Reject";
    rejectBtn.className = "reject-btn";
    rejectBtn.onclick = () => updateStatus(b.id, "Rejected");

    // Complete button
    let completeBtn = document.createElement("button");
    completeBtn.innerText = "Complete";
    completeBtn.className = "complete-btn";
    completeBtn.onclick = () => updateStatus(b.id, "Service Completed");

    actionCell.appendChild(acceptBtn);
    actionCell.appendChild(rejectBtn);
    actionCell.appendChild(completeBtn);
  });
}

// Update booking status in localStorage
function updateStatus(id, status) {
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

  bookings = bookings.map(b => {
    if (b.id === id) b.status = status;
    return b;
  });

  localStorage.setItem("bookings", JSON.stringify(bookings));
  loadBookings();
}

// Auto refresh every 3 seconds
setInterval(loadBookings, 3000);

// First load
loadBookings();
</script>

</body>
</html>
